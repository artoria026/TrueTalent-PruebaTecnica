repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && ruff format'
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-lint
        name: ruff check --fix
        entry: bash -c 'cd backend && ruff check --fix'
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy --strict
        entry: bash -c 'cd backend && mypy --strict app'
        language: system
        types: [python]
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
