[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:redis]
command=redis-server --bind 127.0.0.1 --daemonize no
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:postgres]
command=gosu postgres postgres -D /var/lib/postgresql/data
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:api]
command=/bin/bash -c "until pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} >/dev/null 2>&1; do sleep 1; done; alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
directory=/app
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:worker]
command=/bin/bash -c "until pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} >/dev/null 2>&1; do sleep 1; done; exec python -m app.worker.transaction_worker"
directory=/app
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
